# Generic Node.js Project Template
# Copy this as a starting point for Node.js projects
#
# Usage:
#   1. Copy to your config: cp templates/nodejs/generic.yaml .github/build-config.yaml
#   2. Edit package_name, github_repo, and download_pattern
#   3. Run: ./build.sh .github/build-config.yaml 1.0.0 1

package_name: "my-node-app"
github_repo: "owner/repo"
summary: "A brief description of your Node.js application"
vendor: "Your Name or Organization"
license: "MIT"

# Common Node.js release patterns
download_pattern: "{package_name}-v{version}-linux-{arch}.tar.gz"

architecture_map:
  amd64: "x64"
  arm64: "arm64"
  armhf: "armv7l"
  i386: "x86"

# Binary path (Node.js projects often have bin/ directory)
binary_path: "bin/{package_name}"

# Optional: Node.js runtime dependency
dependencies:
  - nodejs
  - npm

# Optional: If your project is a standalone binary (pkg, vercel/pkg)
# dependencies: []
# download_pattern: "{package_name}-v{version}-linux-{arch}"

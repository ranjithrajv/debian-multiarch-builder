# Demo Configuration for Eza Package
# This configuration is used by the demo workflow
#
# Eza: A modern replacement for ls
# GitHub: https://github.com/eza-community/eza

package_name: "eza"
github_repo: "eza-community/eza"
summary: "A modern replacement for ls"
license: "MIT"

# Architecture-specific release patterns
# {version} is replaced with the actual version at build time
architectures:
  amd64:
    release_pattern: "eza_v{version}_x86_64-unknown-linux-gnu.tar.gz"
  arm64:
    release_pattern: "eza_v{version}_aarch64-unknown-linux-gnu.tar.gz"
  armhf:
    release_pattern: "eza_v{version}_armv7-unknown-linux-gnu.tar.gz"

# Optional: Enable parallel builds for faster execution
parallel_builds: true
max_parallel: 2
